<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Indoor Navigator — Admin</title>
    <!-- External styles for MapLibre and Mapbox Draw -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/@mapbox/mapbox-gl-draw@1.4.3/dist/mapbox-gl-draw.css"
    />
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue",
          sans-serif;
        background: #0b0f19;
        color: #e5e7eb;
      }
      #app-container {
        display: flex;
        height: 100%;
        width: 100%;
      }
      #map {
        flex: 1 1 auto;
        position: relative;
      }
      #sidebar {
        width: 340px;
        background: rgba(11, 15, 25, 0.95);
        border-left: 1px solid rgba(255, 255, 255, 0.1);
        padding: 20px 16px;
        box-sizing: border-box;
        overflow-y: auto;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 0;
      }
      .btn {
        padding: 6px 10px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.05);
        color: #e5e7eb;
        cursor: pointer;
        font-size: 13px;
      }
      .btn:hover {
        background: rgba(255, 255, 255, 0.12);
      }
      .btn-primary {
        background: #7c3aed;
        border-color: #7c3aed;
        color: #fff;
      }
      .btn-primary:hover {
        background: #6d28d9;
      }
      select,
      input,
      textarea {
        width: 100%;
        padding: 6px 8px;
        margin-bottom: 8px;
        background: #0b0f19;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 6px;
        color: #e5e7eb;
        box-sizing: border-box;
      }
      textarea {
        resize: vertical;
        min-height: 60px;
      }
      label {
        font-size: 12px;
        margin-bottom: 4px;
      }

      kbd {
        display: inline-block;
        background: rgba(255, 255, 255, 0.1);
        padding: 2px 4px;
        border-radius: 4px;
        font-size: 11px;
        font-family: inherit;
        color: #e5e7eb;
      }

      /* Additional styling for improved UI/UX */
      .sidebar-title {
        margin-top: 0;
        margin-bottom: 12px;
        font-size: 18px;
        font-weight: 600;
        color: #f3f4f6;
      }
      .section {
        margin-bottom: 16px;
      }
      .section h3 {
        margin: 0 0 8px 0;
        font-size: 14px;
        font-weight: 500;
        color: #a78bfa;
      }
      .divider {
        border: none;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        margin: 12px 0;
      }

      /* Mode toggle overlay: positioned in the top‑right corner above the map */
      #mode-toggle {
        position: absolute;
        top: 12px;
        right: 12px;
        z-index: 1000;
      }
      .btn-secondary {
        padding: 6px 10px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: #e5e7eb;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
      }
      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.2);
      }
    </style>
    <script type="module" crossorigin src="/assets/index-jbGWSpcJ.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
